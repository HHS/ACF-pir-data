{% extends "metrics/base.html" %}

{% block main_panel %}
    <div class="card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Number Approved</th>
                </tr>
            </thead>
            {% for key, value in confirmed %}
                <tr>
                    <td>{{ key }}</td>
                    <td>{{ value }}</td>
                </tr>
            {% endfor %}    
        </table>
    </div>
{% endblock %}

{% block scripts %}
    <script type="module" src="https://1.www.s81c.com/common/carbon/web-components/tag/v2/latest/progress-bar.min.js"></script>
{% endblock %}
