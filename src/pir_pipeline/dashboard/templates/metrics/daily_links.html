{% extends "metrics/base.html" %}

{% block main_panel %}
    <div class="card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Number Approved</th>
                </tr>
            </thead>
            {% for key, value in confirmed_dict.items() %}
                <tr>
                    <td>{{ key }}</td>
                    <td>{{ value }}</td>
                </tr>
            {% endfor %}    
        </table>
    </div>
{% endblock %}
